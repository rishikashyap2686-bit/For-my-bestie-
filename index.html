<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Bestie ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.container{
padding:30px;
max-width:700px;
}

h1{
font-size:3rem;
margin-bottom:20px;
animation: glow 2s infinite alternate;
}

p{
font-size:1.3rem;
line-height:1.8;
margin-bottom:20px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
background:white;
color:#ff4f81;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.hidden{
display:none;
}

.heart{
position:absolute;
color:red;
font-size:25px;
animation: float 5s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}

@keyframes glow{
from{
text-shadow:0 0 10px white;
}
to{
text-shadow:0 0 30px white;
}
}
</style>
</head>

<body>

<div class="container">
<h1>💖 Hey Bestie 💖</h1>

<p id="message">
I made this little surprise just for you.
Click the button below ✨
</p>

<button onclick="showSurprise()">Open Surprise ❤️</button>
</div>

<script>

function showSurprise(){
document.querySelector(".container").innerHTML=`
<h1>🌸 Dear Bestie 🌸</h1>

<p>
Thank you for always being there for me. ❤️<br><br>

You are kind, strong, amazing and one of the most
important people in my life. 🌟<br><br>

Whenever things get difficult, remember that
you are capable of achieving great things. 💪✨<br><br>

Keep smiling because your smile makes the world brighter. 😊🌈<br><br>

Thank you for being my best friend. 💕
</p>

<h2>🎉 You Are Awesome! 🎉</h2>
`;
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
